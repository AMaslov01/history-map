  <div id="root"></div>
  <script>
    // Suppress the benign Chromium "ResizeObserver loop completed with
    // undelivered notifications" warning. We wrap the global ResizeObserver
    // so any callback is deferred to the next frame, breaking the loop, and
    // we also intercept the error event/console output as belt + braces.
    (function(){
      const RO = window.ResizeObserver;
      if (RO){
        window.ResizeObserver = class extends RO {
          constructor(cb){
            let raf = 0;
            super((entries, obs) => {
              cancelAnimationFrame(raf);
              raf = requestAnimationFrame(() => { try { cb(entries, obs); } catch(_){} });
            });
          }
        };
      }
      const __origErr = console.error;
      console.error = function(...args){
        const msg = args && args[0];
        if (typeof msg === "string" && /ResizeObserver loop/.test(msg)) return;
        __origErr.apply(console, args);
      };
      window.addEventListener("error", (e) => {
        if (e && e.message && /ResizeObserver loop/.test(e.message)){
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
    })();
  </script>
